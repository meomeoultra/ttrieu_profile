<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tan Trieu day ne!!!</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto Slab', serif; scroll-behavior: smooth; }
    body { background:#0a0a0a; color:#eee; overflow-x:hidden; }

    /* NAVBAR */
    nav {
      width:100%; padding:20px 10%; position:fixed; top:0; left:0; display:flex; justify-content:space-between; align-items:center;
      background:rgba(10,10,10,0.8); backdrop-filter:blur(15px); z-index:100;
      transition: 0.3s;
    }
    nav:hover { background:rgba(10,10,10,0.95); }
    nav .logo { color:#00eaff; font-size:1.8rem; font-weight:700; letter-spacing:2px; }
    nav ul { display:flex; gap:25px; list-style:none; }
    nav ul li a { color:#eee; font-weight:600; text-decoration:none; transition:0.3s; }
    nav ul li a:hover { color:#00eaff; }

    /* PARALLAX BACKGROUND */
    .parallax-bg { position: fixed; width:100%; height:100%; top:0; left:0; background:url('https://images.unsplash.com/photo-1522199755839-a2bacb67c546?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat; z-index:-5; filter: brightness(0.3) blur(2px); transform: scale(1.1); }

    /* HERO SECTION */
    .hero { text-align:center; padding:220px 20px; position:relative; backdrop-filter: blur(6px); }
    .glow-title { font-size:4.5rem; font-weight:900; color:#00eaff;
      text-shadow: 0 0 40px #00eaff, 0 0 80px #009dff;
      animation: glowPulse 4s infinite alternate;
    }
    @keyframes glowPulse { 0% { text-shadow:0 0 25px #00eaff;} 100% { text-shadow:0 0 90px #00aaff;} }
    .sub { font-size:1.4rem; color:#ccc; margin-top:15px; }
    .btn-main { padding:16px 38px; background:#00b7ff; color:#0a0a0a; border-radius:20px; font-size:1.25rem; font-weight:700; display:inline-block; margin-top:25px; text-decoration:none; transition:0.4s; box-shadow:0 8px 30px rgba(0,183,255,0.5); }
    .btn-main:hover { transform: scale(1.1) rotate(-1deg); box-shadow:0 10px 40px rgba(0,183,255,0.7); background:#009dff; }

    /* GLASSMORPHISM SECTIONS */
    .glass-section { backdrop-filter: blur(18px) saturate(180%); background: rgba(255,255,255,0.05); border-radius: 20px;
      margin: 40px; padding: 60px 30px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 0 60px rgba(0,0,0,0.3); transition:0.4s;
    }
    .glass-section:hover { transform: translateY(-5px); box-shadow:0 0 80px rgba(0,255,255,0.4); }

    /* SECTION TITLES */
    .section-title { font-size:2.5rem; color:#00eaff; margin-bottom:30px; position:relative; }
    .section-title::after { content:''; display:block; width:80px; height:4px; background:#00eaff; margin:10px auto 0; border-radius:2px; }

    /* SERVICE CARDS */
    .service-container { display:grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap:40px; margin-top:50px; }
    .service-card { background: rgba(255,255,255,0.1); border-radius:22px; padding:30px; transition:0.5s; border:1px solid rgba(255,255,255,0.12); box-shadow:0 0 30px rgba(0,255,255,0.05); }
    .service-card:hover { transform: translateY(-15px) scale(1.07); box-shadow:0 0 45px rgba(0,255,255,0.35); border-color:#00eaff; }
    .service-card h3 { font-size:1.5rem; margin-bottom:15px; color:#fff; }
    .service-card p { color:#ccc; font-size:1.1rem; }

    /* SOCIAL ICONS */
    .social-icons { display:flex; justify-content:center; gap:35px; margin-top:50px; }
    .social-icons a { font-size:2.8rem; background: rgba(255,255,255,0.12); padding:18px; border-radius:18px; border:1px solid rgba(255,255,255,0.18); transition:0.4s; }
    .social-icons a:hover { transform: scale(1.3) rotate(5deg); box-shadow:0 0 35px rgba(0,255,255,0.8); border-color:#00eaff; }

    /* FOOTER */
    footer { text-align:center; padding:50px 20px; color:#888; font-size:1rem; background:#121212; }
  </style>
</head>
<body>
  <div class="parallax-bg"></div>

  <nav>
    <div class="logo">TANTRIEU</div>
    <ul class="nav-links">
      <li><a href="#home">Trang Chủ</a></li>
      <li><a href="#services">Dịch Vụ</a></li>
      <li><a href="#contact">Liên Hệ</a></li>
    </ul>
  </nav>

  <section id="home" class="hero glass-section">
    <h1 class="glow-title">Tan Trieu</h1>
    <p class="sub">Meo Meo</p>
    <a href="#services" class="btn-main">Xem Dịch Vụ</a>
  </section>

  <section id="services" class="glass-section">
    <h2 class="section-title">Dịch Vụ </h2>
    <div class="service-container">
      <div class="service-card"><h3>1</h3><p>OFF</p></div>
      <div class="service-card"><h3>2</h3><p>OFF</p></div>
      <div class="service-card"><h3>3</h3><p>OFF</p></div>
    </div>
  </section>

  <section id="contact" class="glass-section">
    <h2 class="section-title">Liên hệ cho anh tại</h2>
    <div class="social-icons">
      <a href="https://www.facebook.com/share/17dvvdV4MC/" target="_blank"><i class="fab fa-facebook"></i></a>
      <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://t.me/Meomeo11t" target="_blank"><i class="fab fa-telegram"></i></a>
    </div>
  </section>

  <footer>© 2025 TanTrieu | GOOD LUCK  ❤️</footer>
</body>
</html>
