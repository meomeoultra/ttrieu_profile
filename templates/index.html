  <style>

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto Slab', serif; }
    body { background:#0a0a0a; color:#eee; overflow-x:hidden; scroll-behavior:smooth; }

    nav {
      width:100%; padding:20px 10%; position:fixed; top:0; left:0; display:flex; justify-content:space-between; align-items:center; background:rgba(10,10,10,0.9); backdrop-filter:blur(10px); z-index:100;

      text-align:center; overflow:hidden;
    }

    header::after {
      content:''; position:absolute; width:200%; height:200%; background:radial-gradient(circle,#00ffff33,transparent 70%);
      animation: rotate 20s linear infinite; top:-50%; left:-50%; z-index:0;
    }
    @keyframes rotate { 0% { transform:rotate(0deg);} 100% { transform:rotate(360deg);} }

    .hero { position:relative; z-index:1; max-width:800px; }
    .hero h1 { font-size:3rem; color:#00ffff; margin-bottom:10px; }
    .hero p { font-size:1.3rem; margin-bottom:25px; color:#ccc; }
    .hero .btn { padding:14px 32px; border-radius:30px; background:#00ffff; color:#0a0a0a; font-weight:bold; text-decoration:none; transition:0.3s; box-shadow:0 5px 15px rgba(0,255,255,0.4); }
    .hero .btn:hover { background:#0ff; box-shadow:0 8px 20px rgba(0,255,255,0.6); }

    section { padding:100px 10%; }
    h2 { font-size:2.2rem; color:#00ffff; margin-bottom:30px; text-align:center; position:relative; }
    h2::after { content:''; display:block; width:60px; height:3px; background:#00ffff; margin:10px auto 0; border-radius:2px; }

    .content { max-width:900px; margin:auto; line-height:1.7; color:#ccc; font-size:1.1rem; }

    .card-container { display:grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap:40px; margin-top:50px; }
    .card { background: #1a1a1a; padding:30px; border-radius:20px; box-shadow:0 15px 30px rgba(0,255,255,0.1); transition:0.4s; text-align:center; }
    .card:hover { transform: translateY(-15px) scale(1.05); box-shadow:0 20px 40px rgba(0,255,255,0.3); }
    .card i { font-size:2.5rem; margin-bottom:20px; color:#00ffff; }
    .card h3 { margin-bottom:15px; color:#fff; font-size:1.4rem; }

    .socials { display:flex; justify-content:center; gap:35px; margin-top:50px; }
    .socials a { font-size:2.2rem; color:#00ffff; transition:0.3s; }
    .socials a:hover { color:#fff; transform:scale(1.3); }

    footer { padding:40px 10%; text-align:center; color:#888; background:#121212; font-size:0.95rem; }

    /* Smooth scroll and hover effects */
    nav a, .btn, .socials a { cursor:pointer; }
  </style>
